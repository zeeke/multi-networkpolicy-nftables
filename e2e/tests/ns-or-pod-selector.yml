---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  namespace: default
  name: macvlan1-ns-or-pod
spec:
  config: '{
            "cniVersion": "0.3.1",
            "name": "macvlan1-ns-or-pod",
            "plugins": [
                {
                    "type": "macvlan",
                    "mode": "bridge",
                    "ipam":{
                      "type":"host-local",
                      "subnet":"2.2.10.0/24",
                      "rangeStart":"2.2.10.8",
                      "rangeEnd":"2.2.10.67"
                    }
                }]
        }'
---
apiVersion: v1
kind: Namespace
metadata:
  name: test-ns-or-pod-x
  labels:
    ns: "x"
---
apiVersion: v1
