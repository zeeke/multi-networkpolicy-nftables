---
# MultiNetworkPolicy: OR combination of namespace selector and pod selector
# Allow ingress to nsX/podA from:
#   - any pod in namespace nsY (namespaceSelector: ns=y)
#   OR
#   - any pod labeled pod=b (podSelector: pod=b)
apiVersion: k8s.cni.cncf.io/v1beta1
kind: MultiNetworkPolicy
metadata:
  name: or-ns-pod-selector-policy
  namespace: test-ns-or-pod-x
  annotations:
    k8s.v1.cni.cncf.io/policy-for: default/macvlan1-ns-or-pod
spec:
  podSelector:
    matchLabels:
      pod: a
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              ns: "y"
        - podSelector:
            matchLabels:
              pod: b
