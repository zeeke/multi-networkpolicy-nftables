---
# nsX pods
apiVersion: v1
kind: Pod
metadata:
  name: pod-a
  namespace: test-ns-or-pod-x
  annotations:
    k8s.v1.cni.cncf.io/networks: default/macvlan1-ns-or-pod
  labels:
    app: test-ns-or-pod
    pod: a
spec:
  containers:
    - name: server
      image: localhost:5000/multus-networkpolicy-nftables-tests:e2e
      command: ["nc", "-kl", "0.0.0.0", "5555"]
      securityContext:
        privileged: true
---
